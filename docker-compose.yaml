services:
  manager:
    build:
      context: .
      dockerfile: Dockerfile.manager

    container_name: crackhash_manager

    command: >
      sh -c "
      cd app &&
      python manage.py migrate &&
      python manage.py requeue_tasks &&
      gunicorn crackhash_back.wsgi:application --bind 0.0.0.0:8000
      "

    ports:
      - "8000:8000"

    environment:
      DJANGO_SETTINGS_MODULE: crackhash_back.settings
      PYTHONUNBUFFERED: "1"

      # Celery
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://

      # MongoDB Replica Set
      MONGO_DB_NAME: crackhash
      MONGO_URI: mongodb://root:root@mongo1:27017,mongo2:27017,mongo3:27017/crackhash?replicaSet=rs0&authSource=admin

      # CrackHash runtime
      CRACKHASH_PART_COUNT: "4"
      CRACKHASH_REQUEST_TIMEOUT_SECONDS: "300"

    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully

      rabbitmq:
        condition: service_healthy

    networks:
      - crackhash_net

    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.celery

    container_name: crackhash_worker

    command: >
      sh -c "
      cd app &&
      celery -A crackhash_back.celery worker -l info --concurrency=8
      "

    environment:
      DJANGO_SETTINGS_MODULE: crackhash_back.settings
      PYTHONUNBUFFERED: "1"

      # Celery
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://

      # MongoDB Replica Set
      MONGO_DB_NAME: crackhash
      MONGO_URI: mongodb://root:root@mongo1:27017,mongo2:27017,mongo3:27017/crackhash?replicaSet=rs0&authSource=admin

    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully

      rabbitmq:
        condition: service_healthy

    networks:
      - crackhash_net

    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management

    container_name: crackhash_rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

    networks:
      - crackhash_net

    restart: unless-stopped

  mongo1:
    image: mongo:8

    container_name: mongo1

    command:
      [
        "mongod",
        "--replSet",
        "rs0",
        "--bind_ip_all",
        "--keyFile",
        "/etc/mongo-keyfile/keyfile"
      ]

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root

    volumes:
      - mongo1_data:/data/db
      - ./keyfile:/etc/mongo-keyfile/keyfile:ro

    healthcheck:
      test: >
        mongosh --quiet --eval "db.adminCommand('ping').ok"
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - crackhash_net

    restart: unless-stopped

  mongo2:
    image: mongo:8

    container_name: mongo2

    command:
      [
        "mongod",
        "--replSet",
        "rs0",
        "--bind_ip_all",
        "--keyFile",
        "/etc/mongo-keyfile/keyfile"
      ]

    ports:
      - "27018:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root

    volumes:
      - mongo2_data:/data/db
      - ./keyfile:/etc/mongo-keyfile/keyfile:ro

    healthcheck:
      test: >
        mongosh --quiet --eval "db.adminCommand('ping').ok"
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - crackhash_net

    restart: unless-stopped

  mongo3:
    image: mongo:8

    container_name: mongo3

    command:
      [
        "mongod",
        "--replSet",
        "rs0",
        "--bind_ip_all",
        "--keyFile",
        "/etc/mongo-keyfile/keyfile"
      ]

    ports:
      - "27019:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root

    volumes:
      - mongo3_data:/data/db
      - ./keyfile:/etc/mongo-keyfile/keyfile:ro

    healthcheck:
      test: >
        mongosh --quiet --eval "db.adminCommand('ping').ok"
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - crackhash_net

    restart: unless-stopped

  mongo-init-replica:
    image: mongo:8

    container_name: mongo_init_replica

    depends_on:
      mongo1:
        condition: service_healthy

      mongo2:
        condition: service_healthy

      mongo3:
        condition: service_healthy

    restart: "no"

    networks:
      - crackhash_net

    entrypoint: >
      bash -c '
        sleep 10;

        mongosh --host mongo1:27017 \
          -u root \
          -p root \
          --authenticationDatabase admin \
          --eval "
            rs.initiate({
              _id: \"rs0\",
              members: [
                { _id: 0, host: \"mongo1:27017\" },
                { _id: 1, host: \"mongo2:27017\" },
                { _id: 2, host: \"mongo3:27017\" }
              ]
            })
          " || true
      '

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:

networks:
  crackhash_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.0.0/16